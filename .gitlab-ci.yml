# Build the macOS app bundle (JourneyForgeLocal-mac.zip) on a Linux runner.
# The .app is a pure-file wrapper (Info.plist + launcher + project + zip), so it
# assembles anywhere — no macOS runner required. The artifact is downloadable
# from the job page, and via a stable "latest" URL (see README of this job).

stages: [build]

build-app:
  stage: build
  image: node:20-bookworm-slim
  variables:
    PNPM_HOME: "$CI_PROJECT_DIR/.pnpm-store"
  cache:
    key: pnpm-${CI_COMMIT_REF_SLUG}
    paths:
      - .pnpm-store/
      - extension/node_modules/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends zip rsync
    - corepack enable && corepack prepare pnpm@9 --activate
    - pnpm config set store-dir "$PNPM_HOME"
  script:
    - echo "Building extension…"
    - (cd extension && pnpm install --no-frozen-lockfile && pnpm build)
    - echo "Assembling macOS .app bundle…"
    - bash packaging/build-mac-app.sh "$CI_PROJECT_DIR/out"
    - ls -lh out/JourneyForgeLocal-mac.zip
    - 'echo "Download this build: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/file/out/JourneyForgeLocal-mac.zip"'
  artifacts:
    name: "JourneyForgeLocal-mac-$CI_COMMIT_SHORT_SHA"
    paths:
      - out/JourneyForgeLocal-mac.zip
    expire_in: 12 weeks
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'        # lets you trigger a build by hand
